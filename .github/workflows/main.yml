name: Wiki Auto-Purge Engine

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Pywikibot
        run: pip install pywikibot

      - name: Run Bot
        env:
          # Use your secret here
          RAW_PASS: ${{ secrets.BOT_PASSWORD }}
        run: |
          # Create the password file Pywikibot requires
          # Format: (u'Username', u'Password')
          echo "('TRCDBot@TRCDBot_AutoPurge', '$RAW_PASS')" > passwordfile
          python bot.py
