name: Wiki Auto-Purge Engine

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Pywikibot
        run: pip install pywikibot
        
      - name: Create password file & run bot
        env:
          RAW_PASS: ${{ secrets.PASSWORDFILE }}
        run: |
          python - <<'EOF'
          import os
          pw = os.environ['RAW_PASS']
          with open('passwordfile', 'w') as f:
              f.write(f"('miraheze', 'Test Account0', '{pw}')\n")
          EOF
          python bot.py
